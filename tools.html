<script>

function showInfo(title, info, img){
document.getElementById("popup").style.display="flex";
document.getElementById("toolTitle").innerText=title;
document.getElementById("toolInfo").innerText=info;
document.getElementById("toolImage").src=img;
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

</script>
